<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Carbostar PX · Zero Waste Forum 2026 · Mission Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #07090d;
    --bg-2:      #0c1018;
    --panel:     oklch(0.16 0.012 235);
    --panel-2:   oklch(0.19 0.015 235);
    --border:    rgba(255,255,255,0.07);
    --border-2:  rgba(255,255,255,0.12);
    --text:      #e8edf2;
    --text-mute: rgba(232,237,242,0.6);
    --text-dim:  rgba(232,237,242,0.4);
    --primary:   oklch(0.65 0.14 230);
    --primary-2: oklch(0.55 0.16 230);
    --accent:    oklch(0.72 0.14 155);
    --amber:     oklch(0.78 0.14 75);
    --red:       oklch(0.65 0.18 25);
    --violet:    oklch(0.62 0.18 295);
    --gold:      oklch(0.80 0.13 80);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', Inter, -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  ::selection { background: var(--primary); color: #fff; }

  /* monospace eyebrows */
  .eyebrow {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--primary); font-weight: 500;
  }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  .mute { color: var(--text-mute); }
  .dim  { color: var(--text-dim); }
  h1, h2, h3 { font-weight: 600; letter-spacing: -0.6px; text-wrap: balance; margin: 0; }
  p { margin: 0; text-wrap: pretty; }
  button { font-family: inherit; }

  /* layout */
  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 32px; }
  section { position: relative; }

  /* nav */
  nav.top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(7,9,13,0.6);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }
  nav.top .brand { display: flex; align-items: center; gap: 10px; }
  nav.top .brand-mark {
    width: 22px; height: 22px; border-radius: 6px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    box-shadow: 0 4px 14px oklch(0.5 0.18 230 / 0.4);
  }
  nav.top .brand-text {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; letter-spacing: 2.5px; font-weight: 500;
    color: var(--text);
  }
  nav.top ul {
    list-style: none; padding: 0; margin: 0;
    display: flex; gap: 4px;
  }
  nav.top ul a {
    display: block; padding: 6px 10px; border-radius: 8px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: 1.6px; text-decoration: none;
    color: var(--text-mute); transition: all 0.2s;
  }
  nav.top ul a:hover { color: var(--text); background: var(--border); }
  nav.top .pill {
    padding: 5px 10px; border-radius: 100px;
    background: oklch(0.30 0.06 30 / 0.25);
    border: 1px solid oklch(0.60 0.16 30 / 0.4);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1.5px; color: var(--amber);
    display: flex; align-items: center; gap: 6px;
  }
  nav.top .pill .dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--amber);
    animation: pulse 1.4s ease-in-out infinite;
  }

  /* hero */
  .hero {
    min-height: 100vh; padding: 120px 0 80px;
    position: relative; overflow: hidden;
  }
  .hero-grid-bg { position: absolute; inset: 0; opacity: 0.5; pointer-events: none; }
  .hero-content { position: relative; z-index: 2; }
  .hero h1 {
    font-size: 92px; line-height: 0.96; letter-spacing: -3.5px;
    margin: 24px 0 26px;
    max-width: 1100px;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero p.lede {
    font-size: 19px; max-width: 720px; line-height: 1.55;
    color: var(--text-mute); margin-bottom: 56px;
  }
  .countdown {
    display: grid; grid-template-columns: repeat(4, 160px); gap: 12px;
    margin-bottom: 56px;
  }
  .countdown-cell {
    padding: 18px 20px; border-radius: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .countdown-cell .value {
    font-family: 'Geist', system-ui;
    font-size: 56px; font-weight: 600; line-height: 1; letter-spacing: -2.5px;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .countdown-cell .label {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
    margin-top: 8px;
  }
  .countdown-cell::after {
    content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 2px;
    background: linear-gradient(180deg, transparent, var(--primary), transparent);
    opacity: 0.4;
  }

  .stat-row {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px;
    margin-top: 12px;
  }
  .stat {
    padding: 18px 18px 16px; border-radius: 14px;
    background: var(--panel); border: 1px solid var(--border);
    position: relative;
  }
  .stat .v {
    font-size: 32px; font-weight: 600; letter-spacing: -1.2px; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat .l {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1.5px; color: var(--text-dim);
    margin-top: 6px;
  }
  .stat .sub {
    font-size: 11px; color: var(--text-mute); margin-top: 4px;
  }

  /* section heading */
  .sec-head { padding: 96px 0 32px; }
  .sec-head h2 {
    font-size: 52px; letter-spacing: -1.8px; line-height: 1.05; margin-top: 12px;
    max-width: 900px;
  }
  .sec-head p {
    color: var(--text-mute); font-size: 16px; line-height: 1.55;
    max-width: 700px; margin-top: 16px;
  }

  /* generic card */
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; padding: 24px;
  }

  /* the stage */
  .stage-grid {
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px;
  }
  .venue-card {
    padding: 0; overflow: hidden;
    position: relative; min-height: 420px;
    background: linear-gradient(160deg, var(--panel), var(--panel-2));
  }
  .venue-card .label-block {
    position: absolute; left: 24px; top: 24px; right: 24px; z-index: 2;
  }
  .venue-card .label-block h3 {
    font-size: 30px; letter-spacing: -1px; margin-top: 8px;
  }
  .venue-card .footer-block {
    position: absolute; left: 24px; bottom: 24px; right: 24px; z-index: 2;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .venue-card .footer-block .item .l {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1.5px; color: var(--text-dim);
  }
  .venue-card .footer-block .item .v {
    font-size: 18px; font-weight: 600; margin-top: 2px;
  }
  .venue-svg { position: absolute; inset: 0; }

  .role-card { display: flex; flex-direction: column; }
  .role-card .partners {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;
  }
  .role-card .partners .p {
    padding: 14px; border-radius: 12px;
    background: oklch(0.22 0.02 235); border: 1px solid var(--border);
  }
  .role-card .partners .p .role {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 4px;
  }
  .role-card .partners .p .who {
    font-size: 14px; font-weight: 600;
  }
  .role-card .partners .p .sub {
    font-size: 11px; color: var(--text-mute); margin-top: 2px;
  }
  .role-card .visibility {
    margin-top: 20px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* carbon experience */
  .ce-wrap {
    display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: stretch;
  }
  .ce-canvas {
    height: 520px; border-radius: 18px; position: relative; overflow: hidden;
    border: 1px solid var(--border);
  }
  .ce-slider-row {
    margin-top: 16px; display: flex; align-items: center; gap: 16px;
    padding: 14px 18px; border-radius: 12px;
    background: var(--panel); border: 1px solid var(--border);
  }
  .ce-slider-row .label {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim);
    min-width: 80px;
  }
  .ce-slider {
    flex: 1; height: 6px; border-radius: 3px;
    background: linear-gradient(90deg,
      oklch(0.72 0.14 155),
      oklch(0.78 0.14 95),
      oklch(0.78 0.14 75),
      oklch(0.65 0.18 25));
    position: relative; cursor: pointer;
  }
  .ce-slider .knob {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 3px solid currentColor;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .ce-readout {
    display: flex; flex-direction: column; gap: 12px;
  }
  .ce-readout .big {
    padding: 24px; border-radius: 16px;
    background: var(--panel); border: 1px solid var(--border);
  }
  .ce-readout .big .v {
    font-size: 64px; font-weight: 600; letter-spacing: -2.5px; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .ce-readout .big .u {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 14px; color: var(--text-mute); margin-left: 6px;
  }
  .ce-readout .feel {
    display: flex; flex-direction: column; gap: 6px; margin-top: 12px;
  }
  .ce-readout .feel-row {
    display: flex; justify-content: space-between;
    font-size: 12px; padding: 6px 0;
    border-top: 1px solid var(--border);
  }
  .ce-readout .feel-row:first-child { border-top: none; }
  .ce-readout .feel-row span:first-child { color: var(--text-mute); }
  .ce-readout .scenarios {
    display: grid; grid-template-rows: 1fr 1fr; gap: 8px;
  }
  .ce-readout .scenario {
    padding: 14px; border-radius: 12px;
    background: var(--panel); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s;
  }
  .ce-readout .scenario:hover { border-color: var(--border-2); }
  .ce-readout .scenario.active {
    border-color: currentColor;
    background: oklch(0.20 0.02 235);
    box-shadow: 0 0 0 3px currentColor / 0.15;
  }
  .ce-readout .scenario .name { font-size: 13px; font-weight: 600; }
  .ce-readout .scenario .sub { font-size: 11px; color: var(--text-mute); margin-top: 2px; }

  /* fleet */
  .fleet-controls {
    display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .fleet-chip {
    padding: 8px 14px; border-radius: 100px;
    background: var(--panel); border: 1px solid var(--border);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: 1.2px; color: var(--text-mute);
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .fleet-chip:hover { color: var(--text); border-color: var(--border-2); }
  .fleet-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .fleet-chip .swatch { width: 8px; height: 8px; border-radius: 2px; }
  .fleet-chip .count { color: var(--text-dim); font-weight: 600; }
  .fleet-chip.active .count { color: rgba(0,0,0,0.5); }

  .fleet-grid-card {
    padding: 32px;
  }
  .fleet-grid {
    display: grid;
    gap: 2px;
  }
  .fleet-meta {
    display: flex; justify-content: space-between; margin-top: 20px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: 1.2px; color: var(--text-dim);
  }

  /* live dashboard */
  .dash {
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }
  .dash-chrome {
    padding: 12px 18px; background: oklch(0.10 0.01 235);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim);
  }
  .dash-chrome .dots { display: flex; gap: 6px; }
  .dash-chrome .dots span {
    width: 10px; height: 10px; border-radius: 50%;
    background: oklch(0.25 0.01 235);
  }
  .dash-body {
    display: grid; grid-template-columns: 1.5fr 1fr; gap: 1px;
    background: var(--border);
  }
  .dash-main, .dash-side {
    background: var(--bg-2); padding: 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .dash-kpi-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  .dash-kpi {
    padding: 14px; border-radius: 12px;
    background: var(--panel); border: 1px solid var(--border);
  }
  .dash-kpi .l {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 8.5px; letter-spacing: 1.2px; color: var(--text-dim);
  }
  .dash-kpi .v {
    font-size: 22px; font-weight: 600; letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums; margin-top: 4px;
  }
  .dash-kpi .d {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; margin-top: 4px;
  }
  .dash-chart {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    flex: 1; min-height: 220px;
    position: relative;
  }
  .dash-heatmap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    min-height: 220px;
  }
  .dash-top-zones {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .zone-row {
    display: grid; grid-template-columns: 18px 1fr 60px 60px; gap: 10px;
    align-items: center; padding: 8px 0;
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .zone-row:first-of-type { border-top: none; }
  .zone-row .rank {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px; color: var(--text-dim);
  }
  .zone-row .bar {
    height: 4px; border-radius: 2px;
    background: var(--border); overflow: hidden;
  }
  .zone-row .bar i {
    display: block; height: 100%; border-radius: 2px;
  }
  .zone-row .v {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; text-align: right; font-variant-numeric: tabular-nums;
  }

  /* roadmap */
  .roadmap {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
  }
  .phase {
    padding: 18px; border-radius: 14px;
    background: var(--panel); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.25s;
    position: relative;
  }
  .phase:hover { transform: translateY(-2px); border-color: var(--border-2); }
  .phase.current {
    border-color: var(--primary);
    background: linear-gradient(160deg, oklch(0.22 0.04 235), var(--panel));
    box-shadow: 0 12px 40px oklch(0.4 0.16 235 / 0.25);
  }
  .phase .week {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1.5px; color: var(--text-dim);
  }
  .phase.current .week { color: var(--primary); }
  .phase .title { font-size: 15px; font-weight: 600; margin-top: 8px; letter-spacing: -0.3px; }
  .phase .dates { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 10px; color: var(--text-mute); margin-top: 4px; }
  .phase ul {
    margin: 14px 0 0; padding: 0; list-style: none;
    display: flex; flex-direction: column; gap: 8px;
  }
  .phase li {
    font-size: 11.5px; color: var(--text-mute); line-height: 1.45;
    padding-left: 14px; position: relative;
  }
  .phase li::before {
    content: ''; position: absolute; left: 0; top: 7px;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim);
  }
  .phase.current li::before { background: var(--accent); }
  .phase .badge {
    position: absolute; top: 14px; right: 14px;
    padding: 3px 7px; border-radius: 100px;
    background: var(--primary); color: #fff;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 8px; letter-spacing: 1.5px; font-weight: 600;
  }

  /* risk matrix */
  .risk-wrap {
    display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: stretch;
  }
  .risk-grid {
    display: grid; grid-template-columns: 80px repeat(3, 1fr); grid-template-rows: 40px repeat(3, 1fr);
    gap: 6px;
    min-height: 480px;
  }
  .risk-grid .axis-label-x, .risk-grid .axis-label-y {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1.5px; color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
  }
  .risk-grid .axis-label-y { writing-mode: vertical-rl; transform: rotate(180deg); }
  .risk-cell {
    border-radius: 12px;
    background: var(--panel); border: 1px solid var(--border);
    padding: 10px; position: relative;
    display: flex; flex-direction: column; gap: 4px;
    overflow: hidden;
  }
  .risk-cell.sev-1 { background: oklch(0.18 0.02 155 / 0.4); border-color: oklch(0.40 0.10 155 / 0.3); }
  .risk-cell.sev-2 { background: oklch(0.20 0.03 95 / 0.4); border-color: oklch(0.50 0.10 95 / 0.4); }
  .risk-cell.sev-3 { background: oklch(0.22 0.05 75 / 0.5); border-color: oklch(0.55 0.14 75 / 0.5); }
  .risk-cell.sev-4 { background: oklch(0.22 0.06 25 / 0.5); border-color: oklch(0.55 0.16 25 / 0.6); }
  .risk-cell .corner-label {
    position: absolute; top: 6px; right: 8px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 8px; letter-spacing: 1px; color: var(--text-dim);
  }
  .risk-pill {
    padding: 4px 7px; border-radius: 6px;
    background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08);
    font-size: 10px; line-height: 1.25; cursor: pointer;
    transition: all 0.15s;
  }
  .risk-pill:hover { background: rgba(0,0,0,0.55); border-color: rgba(255,255,255,0.2); }
  .risk-detail {
    padding: 24px; border-radius: 18px;
    background: var(--panel); border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 12px;
    align-self: stretch;
  }
  .risk-detail .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .risk-detail h3 { font-size: 18px; letter-spacing: -0.4px; }
  .risk-detail .sev-badge {
    padding: 4px 8px; border-radius: 6px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1px; white-space: nowrap;
  }
  .risk-detail .meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 12px; border-radius: 10px;
    background: var(--bg-2); border: 1px solid var(--border);
  }
  .risk-detail .meta .item .l {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 1.3px; color: var(--text-dim);
  }
  .risk-detail .meta .item .v { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .risk-detail .contingency { font-size: 13px; line-height: 1.5; color: var(--text-mute); }

  /* COP31 bridge */
  .bridge {
    position: relative;
    padding: 32px;
    border-radius: 22px;
    background:
      radial-gradient(ellipse at 0% 100%, oklch(0.30 0.12 230 / 0.5), transparent 60%),
      radial-gradient(ellipse at 100% 0%, oklch(0.28 0.16 295 / 0.4), transparent 55%),
      var(--panel);
    border: 1px solid var(--border-2);
    overflow: hidden;
  }
  .bridge-timeline {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    position: relative; margin-top: 20px;
  }
  .bridge-timeline::before {
    content: ''; position: absolute; left: 24px; right: 24px; top: 30px;
    height: 2px;
    background: linear-gradient(90deg, var(--primary), var(--violet), var(--gold));
  }
  .bridge-node {
    padding: 24px 16px 16px;
    position: relative;
    display: flex; flex-direction: column; gap: 8px;
  }
  .bridge-node .dot-marker {

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─── helpers ───────────────────────────────────────────────
function hexPath(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 2;
    pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
  }
  return 'M ' + pts.map(p => p.join(' ')).join(' L ') + ' Z';
}

const EVENT_START = new Date('2026-06-05T09:00:00+03:00').getTime();

function useCountdown() {
  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const ms = Math.max(0, EVENT_START - now);
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms / 3600000) % 24);
  const m = Math.floor((ms / 60000) % 60);
  const s = Math.floor((ms / 1000) % 60);
  return { d, h, m, s };
}

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { rootMargin: '-10% 0%' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

  }, []);

// ─── carbon experience ─────────────────────────────────────
function CarbonExperience() {
  const [ppm, setPpm] = useState(400);
  const slideRef = useRef(null);
  const dragging = useRef(false);

  const setFromX = (clientX) => {
    if (!slideRef.current) return;
    const r = slideRef.current.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    setPpm(Math.round(400 + t * 1800));
  };

  useEffect(() => {
    const m = (e) => { if (dragging.current) setFromX(e.clientX); };
    const u = () => { dragging.current = false; };
    window.addEventListener('mousemove', m);
    window.addEventListener('mouseup', u);
    return () => { window.removeEventListener('mousemove', m); window.removeEventListener('mouseup', u); };
  }, []);

  const t = (ppm - 400) / 1800;
  const color = t < 0.2 ? 'oklch(0.72 0.14 155)'
              : t < 0.5 ? 'oklch(0.78 0.14 95)'
              : t < 0.8 ? 'oklch(0.75 0.14 65)'
              :           'oklch(0.65 0.18 25)';
  const label = t < 0.15 ? 'FOREST FRESH'
              : t < 0.35 ? 'OUTDOOR BASELINE'
              : t < 0.55 ? 'INDOOR · GOOD'
              : t < 0.75 ? 'CROWDED · STUFFY'
              :            'HIGH DENSITY · RESTRICTED';
  const feel = t < 0.25 ? 'Calm. Energetic. Cognitive performance at peak.'
             : t < 0.55 ? 'Alert. Normal indoor air. Concentration intact.'
             : t < 0.75 ? 'Drowsy. Reduced focus. Mild headache risk.'
             :            'Heavy. Headaches likely. Cognitive performance drops.';

  // particle field — denser & redder at high ppm
  const particles = useMemo(() => {
    const out = [];
    for (let i = 0; i < 300; i++) {
      out.push({
        x: Math.random() * 100, y: Math.random() * 100,
        r: 0.3 + Math.random() * 1.5,
        seed: Math.random(),
      });
    }
    return out;
  }, []);
  const visibleCount = Math.floor(20 + t * 280);

  return (
    <section id="carbon">
      <div className="wrap sec-head reveal">
        <div className="eyebrow">02 · CARBON EXPERIENCE AREA</div>
        <h2>An installation that lets visitors feel the air.</h2>
        <p>Two modular chambers built from wood and recycled material. Move the
        slider to walk between them — from 400 ppm forest fresh to 2,000+ ppm
        density. Live sensor readouts pipe into the public dashboard.</p>
      </div>
      <div className="wrap ce-wrap reveal">
        <div>
          <div className="ce-canvas" style={{
            background: `radial-gradient(ellipse at 50% 60%, ${color}33 0%, transparent 70%), var(--panel)` }}>
            <svg viewBox="0 0 800 500" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
              <defs>
                <radialGradient id="ce-fog" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor={color} stopOpacity={0.18 + t * 0.4}/>
                  <stop offset="100%" stopColor={color} stopOpacity="0"/>
                </radialGradient>
              </defs>

              {/* chamber outline */}
              <g opacity="0.8">
                <rect x="80" y="100" width="640" height="300" rx="20"
                  fill="none" stroke="rgba(255,255,255,0.10)" strokeWidth="1.2" strokeDasharray="2 5"/>
                {/* divider */}
                <line x1="400" y1="110" x2="400" y2="390" stroke="rgba(255,255,255,0.10)" strokeWidth="1.2" strokeDasharray="2 5"/>
              </g>

              {/* left side: forest cues (tree silhouettes) — fade as ppm rises */}
              <g opacity={Math.max(0.05, 1 - t * 1.4)}>
                {[120, 180, 240, 300, 360].map((x, i) => (
                  <g key={i} transform={`translate(${x} 320)`}>
                    <rect x="-3" y="0" width="6" height="40" fill="oklch(0.30 0.08 145)"/>
                    <circle cx="0" cy="-15" r={18 + (i%2)*6} fill="oklch(0.55 0.16 155)" opacity="0.5"/>
                  </g>
                ))}
              </g>

              {/* right side: people cues (silhouette circles) — appear as ppm rises */}
              <g opacity={Math.min(0.9, t * 1.4)}>
                {[
                  [440, 320], [490, 340], [540, 320], [590, 340], [640, 320], [680, 340],
                  [460, 280], [510, 300], [560, 280], [610, 300], [660, 280],
                ].map(([x,y], i) => (
                  <g key={i} transform={`translate(${x} ${y})`}>
                    <circle cy="-22" r="8" fill="rgba(255,255,255,0.20)"/>
                    <path d="M -10 0 Q -10 -14 0 -14 Q 10 -14 10 0 Z" fill="rgba(255,255,255,0.15)"/>
                  </g>
                ))}
              </g>

              {/* particle field — CO2 visualization */}
              <g>
                {particles.slice(0, visibleCount).map((p, i) => (
                  <circle key={i}
                    cx={80 + p.x * 6.4} cy={100 + p.y * 3}
                    r={p.r}
                    fill={color} opacity={0.4 + t * 0.4}
                    style={{ animation: `drift ${6 + (p.seed * 6)}s ease-in-out infinite`, animationDelay: `${-p.seed * 6}s` }}
                  />
                ))}
              </g>

              {/* fog overlay */}
              <rect x="80" y="100" width="640" height="300" rx="20" fill="url(#ce-fog)"/>

              {/* sensor pin in chamber */}
              <g transform={`translate(${400 + (t - 0.5) * 200} 250)`}>
                <circle r="22" fill={color} opacity="0.15" style={{ animation: 'pulse 2s ease-in-out infinite' }}/>
                <circle r="10" fill={color}/>
                <circle r="4" fill="#fff"/>
              </g>
            </svg>
          </div>

          <div className="ce-slider-row">
            <span className="label">400 ppm</span>
            <div className="ce-slider" ref={slideRef}
              onMouseDown={(e) => { dragging.current = true; setFromX(e.clientX); }}>
              <div className="knob" style={{ left: `${t * 100}%`, color }}/>
            </div>
            <span className="label" style={{ textAlign: 'right' }}>2200 ppm</span>
          </div>
          <p className="mute" style={{ fontSize: 12, marginTop: 12, lineHeight: 1.55 }}>
            <span style={{ color: 'var(--amber)', fontFamily: 'Geist Mono' }}>SAFETY · </span>
            Chambers continuously ventilated; absolute cap 5,000 ppm. Capacity 10–15 visitors per chamber.
            Materials: modular wood + recycled. Live plants in Zone B donated to a local school post-event.
          </p>
        </div>

        <div className="ce-readout">
          <div className="big">
            <div className="eyebrow" style={{ color }}>CHAMBER · LIVE</div>
            <div style={{ display: 'flex', alignItems: 'baseline', marginTop: 12 }}>
              <span className="v" style={{ color }}>{ppm.toLocaleString()}</span>
              <span className="u">ppm CO₂</span>
            </div>
            <div style={{ fontFamily: 'Geist Mono', fontSize: 10, letterSpacing: 1.5,
              color, marginTop: 6 }}>{label}</div>
            <div className="feel">
              <div className="feel-row">
                <span>Cognitive feel</span>
                <span style={{ color: 'var(--text)' }}>{feel}</span>
              </div>
              <div className="feel-row">
                <span>Module</span>
                <span style={{ color: 'var(--text)' }}>{t < 0.5 ? 'B · Forest' : 'A · Density'}</span>
              </div>
              <div className="feel-row">
                <span>Visitors inside</span>
                <span style={{ color: 'var(--text)' }}>{Math.round(2 + t * 13)} of 15</span>
              </div>
            </div>
          </div>

          <div className="scenarios">
            <div className={`scenario ${t < 0.3 ? 'active' : ''}`} onClick={() => setPpm(420)}
              style={{ color: 'oklch(0.72 0.14 155)' }}>
              <div className="name">Zone B · Forest 400 ppm</div>
              <div className="sub">Trees · plants · birdsong · cold cedar air</div>
            </div>
            <div className={`scenario ${t > 0.6 ? 'active' : ''}`} onClick={() => setPpm(2100)}
              style={{ color: 'oklch(0.65 0.18 25)' }}>
              <div className="name">Zone A · Density 2,000+ ppm</div>
              <div className="sub">Crowd hum · warm air · pressure on your forehead</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

  { id: 'produced',   name: 'Produced',   color: 'oklch(0.45 0.10 235)' },
  { id: 'calibrated', name: 'Calibrated', color: 'oklch(0.65 0.14 230)' },
  { id: 'burnin',     name: 'Burn-in',    color: 'oklch(0.78 0.14 75)' },
  { id: 'packed',     name: 'Packed',     color: 'oklch(0.62 0.18 295)' },
  { id: 'shipped',    name: 'Shipped',    color: 'oklch(0.72 0.14 155)' },
  { id: 'deployed',   name: 'Deployed',   color: 'oklch(0.85 0.14 155)' },
];

function DeviceFleet() {
  // 500 devices in a 25x20 grid. Status distribution reflects current week (we're in Week 2):
  // - Produced: 60% = 300
  // - Calibrated: 25% = 125
  // - Burn-in: 8% = 40
  // - Packed: 4% = 20
  // - Shipped: 2% = 10
  // - Deployed: 1% = 5 (pilot)
  const devices = useMemo(() => {
    const arr = [];
    const seq = [
      { st: 'deployed',   n: 5 },
      { st: 'shipped',    n: 10 },
      { st: 'packed',     n: 20 },
      { st: 'burnin',     n: 40 },
      { st: 'calibrated', n: 125 },
      { st: 'produced',   n: 300 },
    ];
    let id = 1;
    for (const s of seq) {
      for (let i = 0; i < s.n; i++) {
        arr.push({ id: `PX-2026-${String(id).padStart(4, '0')}`, status: s.st });
        id++;
      }
    }
    // shuffle a bit so the grid looks distributed (deterministic by index)
    return arr.sort((a, b) => (a.id.charCodeAt(8) * 31 + a.id.charCodeAt(9)) % 7 - (b.id.charCodeAt(8) * 31 + b.id.charCodeAt(9)) % 7);
  }, []);

  const counts = useMemo(() => {
    const c = {};
    devices.forEach(d => { c[d.status] = (c[d.status] || 0) + 1; });
    c.all = devices.length;
    return c;
  }, [devices]);

  const [filter, setFilter] = useState('all');
  const colorMap = Object.fromEntries(STATUSES.map(s => [s.id, s.color]));
  const [hover, setHover] = useState(null);

  return (
    <section id="fleet">
      <div className="wrap sec-head reveal">
        <div className="eyebrow">03 · THE 500</div>
        <h2>Every Carbostar PX. Tracked. Calibrated. Bound for the stage.</h2>
        <p>Each device is uniquely serialized, factory-calibrated, then burned in for 24 hours
        before packing. Live production status as of today — 21 days from go-live.</p>
      </div>
      <div className="wrap reveal">
        <div className="fleet-controls">
          {STATUSES.map(s => (
            <div key={s.id} className={`fleet-chip ${filter === s.id ? 'active' : ''}`}
              onClick={() => setFilter(s.id)}>
              {s.color && <span className="swatch" style={{ background: s.color }}/>}
              {s.name.toUpperCase()}
              <span className="count">{counts[s.id] || 0}</span>
            </div>
          ))}
        </div>

        <div className="card fleet-grid-card" style={{ position: 'relative' }}>
          <svg viewBox="0 0 1100 660" width="100%" preserveAspectRatio="xMidYMid meet">
            {devices.map((d, i) => {
              const col = i % 25;
              const row = Math.floor(i / 25);
              const r = 16;
              const dx = r * Math.sqrt(3);
              const dy = r * 1.5;
              const x = 30 + col * dx + (row % 2 ? dx / 2 : 0);
              const y = 30 + row * dy;
              const active = filter === 'all' || d.status === filter;
              const c = colorMap[d.status];
              return (
                <g key={d.id} onMouseEnter={() => setHover({ d, x, y })} onMouseLeave={() => setHover(null)}>
                  <path d={hexPath(x, y, r - 1)}
                    fill={active ? c : 'oklch(0.20 0.015 235)'}
                    stroke={active ? c : 'rgba(255,255,255,0.04)'}
                    strokeWidth={active ? 0.5 : 1}
                    opacity={active ? 0.9 : 0.25}
                    style={{ transition: 'all 0.4s', cursor: 'pointer' }}
                  />
                </g>
              );
            })}
          </svg>

          {hover && (
            <div className="tooltip" style={{
              left: `${(hover.x / 1100) * 100}%`, top: `calc(${(hover.y / 660) * 100}% - 32px)`,
              transform: 'translateX(-50%)'
            }}>
              {hover.d.id} · {STATUSES.find(s => s.id === hover.d.status).name.toUpperCase()}
            </div>
          )}

          <div className="fleet-meta">
            <span>PX-2026-0001 → PX-2026-0500 · LOT 04 · BoM locked</span>
            <span>BUFFER · +50 SHADOW UNITS (PX-2026-0501 → 0550)</span>
          </div>
        </div>
      </div>
    </section>
  );
}

  // Sparkline: rolling 60-point curve, evolving

    const N = 60;
    const out = [];
    for (let i = 0; i < N; i++) {
      const t = i / (N - 1);
      const x = 20 + t * (640 - 40);
      const base = 500 + Math.sin(t * 6 + tick * 0.1) * 80
        + Math.sin(t * 14 + tick * 0.05) * 30
        + Math.sin(t * 3 + tick * 0.2) * 60;

function RiskMatrix() {
  const [selected, setSelected] = useState(RISKS[2]); // dashboard outage

  // 3x3 grid: rows = impact (high→low top→bottom we'll reverse so high is top), cols = prob (low→high)
  const impactOrder = ['vhi', 'high', 'med', 'low'];
  const probOrder = ['low', 'med', 'high'];
  const cells = {};
  probOrder.forEach(p => impactOrder.forEach(i => { cells[`${i}-${p}`] = []; }));
  RISKS.forEach(r => {
    const key = `${r.imp}-${r.prob}`;
    if (cells[key]) cells[key].push(r);
  });

  const sevOfCell = (imp, prob) => {
    const ip = { low: 1, med: 2, high: 3, vhi: 4 }[imp];
    const pp = { low: 1, med: 2, high: 3 }[prob];
    const score = ip + pp;
    if (score <= 3) return 1;
    if (score <= 4) return 2;
    if (score <= 5) return 3;
    return 4;
  };
  const sevName = (sev) => ['', 'LOW', 'MOD', 'HIGH', 'CRITICAL'][sev];
  const sevColor = (sev) => ['', 'oklch(0.72 0.14 155)', 'oklch(0.78 0.14 95)', 'oklch(0.78 0.14 65)', 'oklch(0.65 0.18 25)'][sev];

  return (
    <section id="risks">
      <div className="wrap sec-head reveal">
        <div className="eyebrow">06 · RISK MATRIX</div>
        <h2>Twelve risks. Twelve plays. No surprises.</h2>
        <p>Each risk is mapped by probability and impact. Click any pill to see the
        contingency we've pre-staged. The cells the orange-and-red corner are the
        critical-path risks we revisit every Monday.</p>
      </div>
      <div className="wrap risk-wrap reveal">
        <div>
          <div className="risk-grid">
            {/* corner */}
            <div></div>
            {/* prob labels (top row) */}
            <div className="axis-label-x">PROB · LOW</div>
            <div className="axis-label-x">PROB · MED</div>
            <div className="axis-label-x">PROB · HIGH</div>

            {impactOrder.map((imp) => (
              <React.Fragment key={imp}>
                <div className="axis-label-y">IMPACT · {imp === 'vhi' ? 'CRITICAL' : imp.toUpperCase()}</div>
                {probOrder.map((prob) => {
                  const sev = sevOfCell(imp, prob);
                  return (
                    <div key={prob} className={`risk-cell sev-${sev}`}>
                      <span className="corner-label">{sevName(sev)}</span>
                      {cells[`${imp}-${prob}`].map((r, i) => (
                        <div key={i} className="risk-pill"
                          onClick={() => setSelected(r)}
                          style={{ color: selected === r ? '#fff' : 'inherit',
                            background: selected === r ? sevColor(sev) : undefined,
                            borderColor: selected === r ? sevColor(sev) : undefined }}>
                          <span style={{ marginRight: 6 }}>{r.icon}</span>{r.name}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>

        <div className="risk-detail">
          <div className="head">
            <div>
              <div className="eyebrow" style={{ color: sevColor(selected.sev) }}>RISK · CONTINGENCY</div>
              <h3 style={{ marginTop: 6 }}>{selected.icon}  {selected.name}</h3>
            </div>
            <div className="sev-badge" style={{
              color: sevColor(selected.sev),
              background: `${sevColor(selected.sev).replace(')', ' / 0.15)')}`,
              border: `1px solid ${sevColor(selected.sev).replace(')', ' / 0.4)')}`
            }}>{sevName(selected.sev)}</div>
          </div>
          <div className="meta">
            <div className="item">
              <div className="l">PROBABILITY</div>
              <div className="v" style={{ textTransform: 'uppercase' }}>{selected.prob === 'med' ? 'Medium' : selected.prob}</div>
            </div>
            <div className="item">
              <div className="l">IMPACT</div>
              <div className="v" style={{ textTransform: 'uppercase' }}>{selected.imp === 'vhi' ? 'Critical' : selected.imp}</div>
            </div>
          </div>
          <div className="contingency">{selected.contingency}</div>
        </div>
      </div>
    </section>
  );
}
